<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-YQ8DHHJ7RD"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			// Google Consent Mode v2 — default negato (utenti SEE) finché l'utente non sceglie
			gtag('consent', 'default', {
				ad_storage: 'denied',
				ad_user_data: 'denied',
				ad_personalization: 'denied',
				analytics_storage: 'denied',
				wait_for_update: 500
			});
			// Applica una scelta già salvata (visite successive)
			try {
				var saved = JSON.parse(localStorage.getItem('an-cookie-consent'));
				if (saved) {
					gtag('consent', 'update', {
						analytics_storage: saved.analytics ? 'granted' : 'denied',
						ad_storage: saved.marketing ? 'granted' : 'denied',
						ad_user_data: saved.marketing ? 'granted' : 'denied',
						ad_personalization: saved.marketing ? 'granted' : 'denied'
					});
				}
			} catch (e) {}
			gtag('js', new Date());
			gtag('config', 'G-YQ8DHHJ7RD');
		</script>

		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
