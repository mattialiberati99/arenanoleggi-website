services:
  arenanoleggi-website:
    container_name: arenanoleggi-website
    image: arenanoleggi-website:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ORIGIN=${ORIGIN:-https://www.arenanoleggi.it}
    # Porta esterna 5186 → container 3000 (adapter-node)
    ports:
      - '${PORT:-5186}:3000'
    environment:
      - NODE_ENV=production
      - ORIGIN=${ORIGIN:-https://www.arenanoleggi.it}
    restart: unless-stopped
    networks:
      - arenanoleggi-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  arenanoleggi-network:
    driver: bridge
